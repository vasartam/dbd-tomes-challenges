name: Build, push, deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  # Например: ghcr.io/vasartam/dbd-tomes-challenges
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ── 1. Сборка и публикация Docker-образов ─────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для push в ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # встроенный токен, настройка не нужна

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ env.IMAGE_BASE }}:backend-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.IMAGE_BASE }}:frontend-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 2. Деплой на сервер ───────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          envs:     GITHUB_REPOSITORY
          script: |
            cd /srv/dbd-tomes-challenges
            # Подтягиваем актуальные конфиги (docker-compose.yml, nginx.conf и др.)
            git pull
            # Логинимся в ghcr.io под токеном, сохранённым на сервере
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            # Скачиваем свежие образы и перезапускаем
            GITHUB_REPOSITORY=${{ github.repository }} docker compose pull
            GITHUB_REPOSITORY=${{ github.repository }} docker compose up -d --remove-orphans
            # Перезапускаем nginx чтобы он подхватил новые IP пересозданных контейнеров
            docker compose restart nginx
