services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}:backend-latest
    restart: unless-stopped
    env_file: .env
    environment:
      ICONS_DIR: /app/data/challenge_icons
    volumes:
      # База данных живёт на хосте — переживает пересоздание контейнера
      - ./db.sqlite:/app/db.sqlite
      # Иконки заданий — скачиваются скрейпером, раздаются через /challenge_icons/
      - challenge_icons:/app/data/challenge_icons
    networks:
      - app

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}:frontend-latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL-сертификаты монтируются с хоста (certbot на хосте)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  challenge_icons:
