# Конфиг Nginx внутри Docker-сети.
# Имена сервисов (backend, frontend) резолвятся Docker DNS автоматически.

server {
    listen 80;
    server_name dbd-tomes-challenges.vasartam.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dbd-tomes-challenges.vasartam.ru;

    # Сертификаты монтируются с хоста (certbot запускается на хосте)
    ssl_certificate     /etc/letsencrypt/live/dbd-tomes-challenges.vasartam.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dbd-tomes-challenges.vasartam.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Иконки заданий → Flask-контейнер (скачиваются скрейпером на хост)
    location /challenge_icons/ {
        proxy_pass         http://backend:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # API → Flask-контейнер
    location /api/ {
        proxy_pass         http://backend:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # Всё остальное → Next.js-контейнер
    location / {
        proxy_pass         http://frontend:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
