server {
    listen 80;
    server_name dbd-tomes.vasartam.ru;

    # Certbot добавит сюда редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Редирект со старого поддомена
server {
    listen 80;
    server_name dbd-tomes-challenges.vasartam.ru;
    return 301 https://dbd-tomes.vasartam.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name dbd-tomes-challenges.vasartam.ru;

    ssl_certificate     /etc/letsencrypt/live/dbd-tomes-challenges.vasartam.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dbd-tomes-challenges.vasartam.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://dbd-tomes.vasartam.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name dbd-tomes.vasartam.ru;

    # SSL-сертификаты от Let's Encrypt (certbot заполнит эти пути автоматически)
    ssl_certificate     /etc/letsencrypt/live/dbd-tomes.vasartam.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dbd-tomes.vasartam.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API — проксируем на Flask (порт 5001)
    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # Всё остальное — проксируем на Next.js (порт 3001)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
